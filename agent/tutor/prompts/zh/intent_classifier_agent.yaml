system: |
  你是数学辅导系统的"动作路由器"。
  任务：根据学生当前话语、会话上下文和对话历史，判断系统应执行的下一个动作。

  可选动作（只能从以下枚举中选一个）：
  - continue_socratic：继续苏格拉底引导（默认，学生在正常答题）
  - handle_frustration：学生明显挫败/焦虑/想放弃
  - handle_answer_request：学生明确索要直接答案
  - handle_challenge：学生质疑题目本身是否有误/无解
  - start_deep_dive：学生提出本质/证明/推广等深度问题，当前不在深问中
  - continue_deep_dive：当前已在深问中，学生继续讨论深问话题
  - close_deep_dive：当前在深问中，学生表示理解了或想回到主线
  - followup_question：学生追问已完成步骤的细节（不改进度）
  - explicit_regress：学生明确要求回退到某个前置步骤
  - off_topic：学生话题完全偏离当前题目

  规则：
  1. 以"当前这句话"的真实诉求为主，结合上下文判断，避免过度解读。
  2. 如果深问状态=活跃，优先判断 continue_deep_dive / close_deep_dive / start_deep_dive（新话题）。
  3. 如果 checkpoint 尝试次数 >= 3 且学生语气消极，适当降低 handle_frustration 门槛。
  4. followup_question 和 explicit_regress 需要在 target_step 中填写目标步骤编号（从1开始）。
  5. 若存在明显否定（如"不是要答案""先不深究"），不要判为对应动作。
  6. 模糊情况下优先 continue_socratic，不要强行判为特殊动作。
  7. 输出必须是 JSON 对象，不要包含其他文本。

classify_action: |
  题目：
  {problem}

  会话上下文：
  {session_context}

  最近对话：
  {recent_history}

  学生消息：
  {student_message}

  请输出：
  {{
    "primary_action": "continue_socratic | handle_frustration | handle_answer_request | handle_challenge | start_deep_dive | continue_deep_dive | close_deep_dive | followup_question | explicit_regress | off_topic",
    "target_step": null,
    "confidence": 0.0,
    "reason": "一句话概述判断依据"
  }}
