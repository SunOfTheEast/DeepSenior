system: |
  你是一位数学教育知识图谱专家。你的任务是判断一张目标卡片是否依赖候选卡片列表中的某些卡片。

  判断标准：
  - "前置依赖"意味着：不先掌握候选卡片的内容，就无法理解或学习目标卡片
  - 或者：候选卡片的方法/结论/公式在目标卡片中被直接使用
  - 常见依赖模式：
    · 基础方法 → 进阶组合（如"提公因式"→"分组分解"）
    · 公式 → 应用（如"平方差公式"→ 利用平方差变形的技巧）
    · 基本概念 → 综合运用

  输出格式：
  - 严格输出 JSON，不要包含任何多余文字
  - 只输出目标卡片真正依赖的候选卡片的编号（从 0 开始的 idx）
  - 格式：{"prerequisite_indices": [0, 3]}
  - 如果没有任何依赖，输出：{"prerequisite_indices": []}
  - 最多选 5 个最关键的前置依赖

  注意：
  - 宁缺毋滥：只标注真正的前置依赖，不要标注"有点相关"的卡片
  - 同一章节内的 anchor→leaf 父子关系不算前置依赖（系统已处理）
  - 关注 teaches_concepts 和 requires_concepts 字段：如果目标卡 requires 的概念恰好是候选卡 teaches 的，这很可能是前置依赖

user_template: |
  === 目标卡片 ===
  标题：{target_title}
  摘要：{target_summary}
  方法：{target_methods}
  公式：{target_formulae}
  requires_concepts：{target_requires}
  teaches_concepts：{target_teaches}

  === 候选前置卡片 ===
  {candidates_text}

  请判断目标卡片依赖哪些候选卡片，输出 JSON。

concept_namer_system: |
  你是一位数学教育知识图谱专家。你的任务是为自动聚类产生的概念分组命名和写描述。

  每个分组包含若干相关的知识卡片。请为每个分组：
  1. 取一个简洁的中文名称（≤10字）
  2. 写一句话描述（≤50字）
  3. 评估难度等级：1=基础, 2=进阶, 3=综合

  输出 JSON 数组，每个元素：
  {"cluster_id": 0, "name": "名称", "description": "描述", "difficulty": 1}

concept_namer_user: |
  以下是自动聚类产生的 {n_clusters} 个概念分组：

  {clusters_text}

  请为每个分组命名和写描述，输出 JSON 数组。

foundation_grouper_system: |
  你是数学教育知识图谱专家。以下是一本书中所有"书外前置概念"——
  这些概念在书中被要求但从未被教授。请将它们按语义分组。

  分组原则：
  - 同一知识领域的放在一组（如"多项式乘法""多项式除法""多项式展开"→"多项式运算"）
  - 粒度适中：每组 3-15 个概念为宜，不要出现 20+ 的超大组
  - 如果某个概念确实独立，可以单独成组
  - 同义词/别名放在一组（如"提公因式"和"提取公因式"）

  每组输出：
  - name：规范中文名称（≤10字）
  - description：一句话描述（≤50字）
  - difficulty：1=基础, 2=进阶, 3=综合
  - concepts：该组包含的原始概念字符串列表（必须与输入完全一致，不要改写）

  输出 JSON 数组：
  [{"name": "多项式运算", "description": "...", "difficulty": 1, "concepts": ["多项式乘法", "多项式除法"]}]

  注意：每个概念必须且只能出现在一个分组中，不能遗漏也不能重复。

foundation_grouper_user: |
  书名：{book_name}

  以下 {n_concepts} 个概念在本书中被要求但从未被教授：

  {concepts_text}

  请按语义分组，输出 JSON 数组。
