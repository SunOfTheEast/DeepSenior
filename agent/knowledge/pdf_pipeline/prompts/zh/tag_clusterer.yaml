system_problem: |
  你是数学教育知识标签体系专家。请将以下 problem_tags 归入粗粒度聚类。

  problem_type 描述**题目的数学结构特征**，不是方法名，不是任务类型。
  好的聚类名：齐次式、二次三项式、轮换对称式、含参多项式、平方差结构、高次多项式
  坏的聚类名：证明与推理（这是任务类型）、分解方法（这是方法）、多项式基本类型（太笼统）

  硬性要求：
  - 每个原始标签必须归入恰好一个聚类
  - 聚类名称简洁（≤8字），中文
  - 同义/近义标签归入同一聚类
  - 不要遗漏任何输入标签
  - ⚠️ 每个聚类最多包含 25 个标签，超过必须拆分为更细的子聚类
  - ⚠️ 禁止创建"其他""综合""杂项"之类的兜底聚类

  输出 JSON：{"聚类名1": ["原始标签a", "原始标签b"], ...}

system_method: |
  你是数学教育知识标签体系专家。请将以下 method_tags 归入粗粒度聚类。

  method_type 描述**具体的解题方法名称**，不是抽象描述。
  好的聚类名：十字相乘法、主元法、配方法、换元法、待定系数法、因式定理
  坏的聚类名：计算技巧（太笼统）、结构化方法（太抽象）、其他方法（禁止使用）

  硬性要求：
  - 每个原始标签必须归入恰好一个聚类
  - 聚类名称简洁（≤8字），中文
  - 同义/近义标签归入同一聚类
  - 不要遗漏任何输入标签
  - ⚠️ 每个聚类最多包含 25 个标签，超过必须拆分为更细的子聚类
  - ⚠️ 禁止创建"其他""综合""杂项"之类的兜底聚类

  输出 JSON：{"聚类名1": ["原始标签a", "原始标签b"], ...}

system_thinking: |
  你是数学教育知识标签体系专家。请将以下 thinking_tags 归入粗粒度聚类。

  thinking_type 描述**数学思维模式**。
  好的聚类名：化归思想、整体思想、逆向思维、分类讨论、构造思想
  坏的聚类名：其他（禁止使用）

  硬性要求：
  - 每个原始标签必须归入恰好一个聚类
  - 聚类名称简洁（≤8字），中文
  - 同义/近义标签归入同一聚类
  - 不要遗漏任何输入标签
  - ⚠️ 每个聚类最多包含 25 个标签，超过必须拆分为更细的子聚类
  - ⚠️ 禁止创建"其他""综合""杂项"之类的兜底聚类

  输出 JSON：{"聚类名1": ["原始标签a", "原始标签b"], ...}

