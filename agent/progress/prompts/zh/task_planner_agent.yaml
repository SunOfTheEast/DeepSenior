system: |
  你是初高中数学学习路径规划师，生成今日个性化任务清单。
  规划原则：
  1. 优先处理遗忘曲线临界知识点（保留率 < 60%）
  2. 结合长期薄弱点，关注学习节奏（高强度减量、长期未学补量）
  3. 避免连续多天同类型题目，总时间不超上限
  直接输出 JSON，不要复述背景。

plan: |
  学生长期画像：
  {long_term_profile}

  知识点掌握：
  {concept_mastery}

  Ebbinghaus 待复习（按紧迫度排序）：
  {decay_due}

  近期会话：
  {recent_episodes}

  负荷评估：{recent_load}

  要求：最多 {max_tasks} 条，总时间 ≤ {max_minutes} 分钟。

  JSON 格式：
  {{
    "tasks": [
      {{
        "task_type": "review | practice | new_concept | challenge | weak_concept",
        "priority": 1,
        "description": "具体说明",
        "reason": "结合遗忘曲线/长期画像的具体依据",
        "concept_id": "知识点ID 或 null",
        "suggested_difficulty": "基础 | 中等 | 进阶 | null",
        "estimated_minutes": 15
      }}
    ],
    "plan_summary": "今日计划概述"
  }}

  task_type: review=遗忘曲线触发, weak_concept=长期掌握度低, practice=巩固近期内容, new_concept=推进新知识（无紧急复习时）, challenge=升难度（状态好时）。
  priority: 1=紧急, 2=重要, 3=建议。
