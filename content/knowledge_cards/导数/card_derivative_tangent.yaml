card_id: card_derivative_tangent
chapter: 导数
title: 切线问题法
summary: >
  利用导数的几何意义（f'(x₀) 是曲线在 x₀ 处切线的斜率）
  求曲线的切线方程，以及处理过定点的切线、公切线等问题。
general_methods:
  - "在点 (x₀, f(x₀)) 处的切线：y−f(x₀)=f'(x₀)(x−x₀)"
  - "'在某点处的切线'vs'过某点的切线'：前者切点确定，后者需设切点再代入"
  - "公切线：设切点分别在两曲线上，联立斜率相等和切点在切线上"
hints:
  1: "'在某点的切线'和'过某点的切线'有什么区别？"
  2: "过定点的切线怎么求？切点在哪里？"
  3: "'在 P 处切线'→ P 就是切点；'过 P 的切线'→ 设切点 (t, f(t))，求出切线后令 P 在切线上"
common_mistakes:
  - "混淆'在某点处的切线'和'过某点的切线'，前者切点已知，后者需设切点"
  - "公切线问题中只联立了斜率相等而忘记切点在切线上"
  - "隐函数求导时忘记对 y 求导的链式法则"
prerequisite_card_ids: []
problem_tags:
  - 切线
  - 公切线
