card_id: card_derivative_monotonicity
chapter: 导数
title: 单调性分析法
summary: >
  对函数求导，通过分析导数 f'(x) 的符号（正/零/负）确定函数的单调递增区间和单调递减区间。
  是导数应用中最基础也最核心的方法。
general_methods:
  - "求导 f'(x)，解 f'(x)>0 得递增区间，解 f'(x)<0 得递减区间"
  - "f'(x) 的零点将定义域分段，在每段内判断 f'(x) 的符号"
  - "含参数时需对参数分类讨论，使 f'(x) 的零点位置和符号变化不同"
hints:
  1: "先对函数求导，导数大于零意味着什么？"
  2: "f'(x) 的零点在哪里？这些零点把定义域分成几段？"
  3: "令 f'(x)=0 求出驻点，列符号表：在每段取一个测试点代入 f'(x) 判断正负"
common_mistakes:
  - "单调区间不能用并集表示（如'(−∞,0)∪(2,+∞) 递增'应分别写两个区间）"
  - "忘记检查定义域，在不连续点处不能合并单调区间"
  - "含参讨论时遗漏参数等于零或特殊值的情况"
prerequisite_card_ids: []
