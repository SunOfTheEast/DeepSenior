card_id: card_ellipse_focal_chord
chapter: 解析几何
title: 焦点弦法（椭圆）
summary: >
  利用椭圆焦半径公式和焦点弦性质，直接处理过焦点的弦相关问题，
  避免联立方程组，适用于焦点弦长、三角形面积、离心率等问题。
general_methods:
  - "焦半径公式：左焦点 PF₁=a+ex, 右焦点 PF₂=a−ex（e 为离心率）"
  - "焦点弦长公式：过焦点的弦 |AB|=2a−e(x₁+x₂)（右焦点）或用通径公式 |AB|=2b²/a·1/sin²θ"
  - "焦点三角形面积：S=b²·tan(∠F₁PF₂/2)，当 P 在短轴端点时最大"
hints:
  1: "过焦点的弦和焦半径有什么关系？"
  2: "能不能不联立方程，直接用焦点到椭圆上点的距离公式？"
  3: "焦点弦长 = 两个焦半径之和，结合韦达定理中的 x₁+x₂ 可快速求解"
common_mistakes:
  - "焦半径公式中 ex 的符号搞反（左焦点和右焦点公式混淆）"
  - "焦点弦公式适用条件：弦必须过焦点，非焦点弦不能直接套用"
  - "求面积时忘记焦点到弦的距离不是焦半径"
