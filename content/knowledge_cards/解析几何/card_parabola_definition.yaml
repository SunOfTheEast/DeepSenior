card_id: card_parabola_definition
chapter: 解析几何
title: 定义法（抛物线）
summary: >
  利用抛物线定义"到焦点的距离 = 到准线的距离"将焦点距离问题
  转化为到准线的距离问题，是处理最值和轨迹问题的利器。
general_methods:
  - "定义转化：|PF|=d(P, 准线)=x₀+p/2"
  - "最值问题：将 |PF|+|PA| 转化为 d(P,准线)+|PA|，再用'两点之间直线最短'"
  - "轨迹判定：若动点到定点和定直线等距，轨迹为抛物线"
hints:
  1: "到焦点的距离能不能换成到准线的距离？"
  2: "换成到准线的距离后，能不能用几何直觉找最小值？"
  3: "|PF|=到准线距离，所以 |PF|+|PA| = 到准线距离+|PA|，当 P、A 和准线上的垂足三点共线时最小"
common_mistakes:
  - "转化为准线距离后忘记'两点之间直线最短'需要三点共线的条件"
  - "准线方程搞错：y²=2px 的准线是 x=−p/2"
  - "忘记验证最优点确实在抛物线上"
