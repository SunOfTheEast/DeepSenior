card_id: card_hyperbola_point_difference
chapter: 解析几何
title: 点差法（双曲线弦中点问题）
summary: >
  点差法用于双曲线弦中点问题。将弦两端点分别代入双曲线方程 x²/a²−y²/b²=1 后相减，
  利用平方差公式得到中点坐标与弦斜率的关系 k=(b²x₀)/(a²y₀)，
  再结合直线的附加条件求解。注意双曲线点差法的斜率符号与椭圆相反。
general_methods:
  - "设弦两端点 A(x₁,y₁)、B(x₂,y₂) 均在双曲线上，分别代入后相减"
  - "利用平方差展开，代入中点 M(x₀,y₀) 得 k=b²x₀/(a²y₀)"
  - "结合直线的其他条件（过定点等）联立消去 k，得中点轨迹方程"
hints:
  1: "双曲线方程有减号，相减后正负号和椭圆有什么不同？"
  2: "代入中点后得到 k=b²x₀/(a²y₀)，注意符号是正的，与椭圆正好相反"
  3: "联立两个 k 的表达式，交叉相乘后整理即可得轨迹方程"
common_mistakes:
  - "符号错误：双曲线点差法的斜率-中点关系是 k=b²x₀/(a²y₀)，不带负号"
  - "忘记验证弦两端点是否在双曲线的同一支上"
  - "中点轨迹需排除不在双曲线内部的无效区域"
