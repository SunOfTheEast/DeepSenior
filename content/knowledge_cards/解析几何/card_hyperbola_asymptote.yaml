card_id: card_hyperbola_asymptote
chapter: 解析几何
title: 渐近线法（双曲线）
summary: >
  利用双曲线的渐近线 y=±(b/a)x 建立辅助关系，求渐近线方程、
  判断直线与双曲线交点数、或利用共渐近线系方程快速构造双曲线。
general_methods:
  - "渐近线方程：x²/a²−y²/b²=0 分解为 y=±(b/a)x"
  - "共渐近线系：与已知双曲线共渐近线的双曲线方程为 x²/a²−y²/b²=λ (λ≠0)"
  - "双曲线上点到渐近线的最短距离 = ab/c（在顶点处取得）"
hints:
  1: "双曲线的渐近线方程是什么？怎么从标准方程得到？"
  2: "如果要找和已知双曲线有相同渐近线的另一条双曲线，怎么设方程？"
  3: "令双曲线方程右边 =0 即得渐近线；共渐近线系只需将 =1 换成 =λ"
common_mistakes:
  - "混淆渐近线方程和双曲线方程（渐近线是令右边=0，不是=1）"
  - "共渐近线系中忘记 λ≠0 的限制"
  - "求点到渐近线距离时用点到直线距离公式代入出错"
