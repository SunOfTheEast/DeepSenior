card_id: card_parabola_focal_chord
chapter: 解析几何
title: 焦点弦法（抛物线）
summary: >
  利用抛物线焦半径公式和焦点弦性质处理过焦点的弦问题，
  抛物线的焦点弦性质比椭圆/双曲线更丰富且更常考。
general_methods:
  - "焦半径公式：|PF|=x₀+p/2（y²=2px 的情形）"
  - "焦点弦长：|AB|=x₁+x₂+p，或用参数表示 |AB|=2p/sin²θ（θ 为弦与 x 轴夹角）"
  - "焦点弦端点纵坐标之积：y₁y₂=−p²（过焦点的弦）"
hints:
  1: "抛物线上点到焦点的距离能不能用点的坐标直接算？"
  2: "焦半径公式怎么用？|PF| 等于什么？"
  3: "|PF|=x₀+p/2，这是定义直接推出的。焦点弦长=x₁+x₂+p"
common_mistakes:
  - "焦半径公式中 p/2 的符号或系数搞错"
  - "混淆 y²=2px 和 y²=4px 两种形式下的焦点坐标（分别是 (p/2,0) 和 (p,0)）"
  - "y₁y₂=−p² 只对过焦点的弦成立，普通弦不能直接用"
