card_id: card_ellipse_set_point
chapter: 解析几何
title: 设点联立法（椭圆）
summary: >
  设直线与椭圆的交点坐标，联立方程组消元得到一元二次方程，
  利用韦达定理建立两根之间的关系，是解析几何最通用的标准方法。
general_methods:
  - "设直线 y=kx+m（或 x=my+n），代入椭圆方程得关于 x（或 y）的一元二次方程"
  - "判别式 Δ≥0 保证交点存在，韦达定理得 x₁+x₂、x₁x₂ 的表达式"
  - "将目标量（弦长、面积、中点等）用韦达定理的结果表示，避免分别求根"
hints:
  1: "直线和椭圆联立之后，能得到什么类型的方程？"
  2: "一元二次方程的两个根代表什么？韦达定理能给你哪些信息？"
  3: "代入消元后整理为 Ax²+Bx+C=0，则 x₁+x₂=−B/A, x₁x₂=C/A，直接代入目标表达式"
common_mistakes:
  - "忘记检验 Δ≥0，结论中遗漏判别式对参数的约束"
  - "直线斜率不存在时（竖直线）未单独讨论"
  - "韦达定理代入后化简出错，尤其是弦长公式 |AB|=√(1+k²)·|x₁−x₂| 中忘记绝对值"
