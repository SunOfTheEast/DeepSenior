card_id: card_hyperbola_definition
chapter: 解析几何
title: 定义法（双曲线）
summary: >
  直接利用双曲线定义 ||PF₁|−|PF₂||=2a 求解距离、轨迹、最值等问题，
  是处理焦点距离相关问题最简洁的方法。
general_methods:
  - "双曲线定义：到两焦点距离之差的绝对值等于 2a"
  - "右支上：|PF₁|−|PF₂|=2a；左支上：|PF₂|−|PF₁|=2a"
  - "轨迹问题：若动点满足到两定点距离差的绝对值为定值 2a < 2c，则轨迹为双曲线"
hints:
  1: "题目中有到两个焦点的距离，能直接用定义吗？"
  2: "双曲线上的点到两焦点距离之差是常数，这个常数是多少？"
  3: "||PF₁|−|PF₂||=2a，注意绝对值——右支上 PF₁−PF₂=2a，左支相反"
common_mistakes:
  - "忘记绝对值：|PF₁|−|PF₂|=2a 只在右支成立，左支符号相反"
  - "定义中 2a < 2c 的条件遗漏（否则轨迹不存在或退化）"
  - "只取一支而漏掉另一支的情况"
