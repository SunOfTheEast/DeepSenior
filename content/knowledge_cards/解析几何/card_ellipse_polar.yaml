card_id: card_ellipse_polar
chapter: 解析几何
title: 极坐标法（椭圆）
summary: >
  以焦点为极点建立极坐标系，利用椭圆的焦点极坐标方程
  ρ=a(1−e²)/(1−e·cosθ) 处理焦点相关问题，简化角度运算。
general_methods:
  - "焦点极坐标方程：ρ=b²/a / (1−e·cosθ)（以右焦点为极点，极轴沿正 x 方向）"
  - "焦点弦两端 ρ₁、ρ₂ 满足 1/ρ₁+1/ρ₂=2a/b²，可快速求弦长倒数和"
  - "极坐标下面积公式 S=½ρ₁ρ₂·sin(θ₁−θ₂) 可直接用于焦点三角形"
hints:
  1: "如果以焦点为原点建立极坐标，椭圆方程会变成什么样？"
  2: "极坐标方程中 ρ 和 θ 的关系能不能直接给出焦半径？"
  3: "以右焦点为极点，ρ=b²/a/(1−e·cosθ)，代入角度即可得焦半径值"
common_mistakes:
  - "极点选择错误：左焦点和右焦点对应的极坐标方程符号不同"
  - "角度 θ 的定义方向搞混（从极轴正向逆时针为正）"
  - "极坐标方程只适用于以焦点为极点的情形，以中心为极点需另外推导"
