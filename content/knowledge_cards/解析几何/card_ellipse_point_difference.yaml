card_id: card_ellipse_point_difference
chapter: 解析几何
title: 点差法（椭圆弦中点问题）
summary: >
  点差法是处理椭圆弦中点问题的高效替代方法。将两个端点分别代入椭圆方程后相减，
  利用平方差公式直接建立中点坐标与弦斜率的关系，避免了完整的联立消元过程。
  适用于已知或需要求弦中点的题型。
general_methods:
  - "设弦两端点 A(x₁,y₁)、B(x₂,y₂) 均在椭圆 x²/a²+y²/b²=1 上，分别代入得两个等式"
  - "两式相减，利用平方差公式 x₁²−x₂²=(x₁+x₂)(x₁−x₂) 展开"
  - "设中点 M(x₀,y₀)，代入 x₁+x₂=2x₀、y₁+y₂=2y₀，得斜率-中点关系 k=−(b²x₀)/(a²y₀)"
  - "再结合直线的其他条件（过定点、斜率已知等）联立求解"
hints:
  1: "把 A、B 两点分别代入椭圆方程，两个等式相减后能得到什么？"
  2: "相减后出现 x₁²−x₂² 和 y₁²−y₂²，能用什么公式展开？中点坐标怎么代入？"
  3: "代入中点后得到 k=−b²x₀/(a²y₀)，再用直线过定点的条件列出另一个 k 的表达式，联立消去 k"
common_mistakes:
  - "相减后漏掉某一项，尤其是常数项相消后忘记简化"
  - "混淆弦斜率 k=(y₁−y₂)/(x₁−x₂) 与中点斜率的含义"
  - "最终轨迹方程忘记标注中点需在椭圆内部的约束条件"
  - "直线斜率不存在（竖直弦）时未单独验证"
