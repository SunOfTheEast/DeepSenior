card_id: card_hyperbola_elimination
chapter: 解析几何
title: 联立消元技巧（双曲线）
summary: >
  双曲线联立消元的高级技巧，包括设而不求、齐次化处理、
  以及双曲线特有的渐近线退化情况的处理策略。
general_methods:
  - "设而不求：利用韦达定理的和与积表示目标量，避免求出具体根"
  - "齐次化：当目标涉及斜率乘积 k₁k₂ 时，可对双曲线方程齐次化处理"
  - "优先消元方向：根据直线设法选择消 x 或消 y，使整理后系数更简洁"
hints:
  1: "能不能只用 x₁+x₂ 和 x₁x₂ 来表示要求的量？"
  2: "如果问题涉及两条直线的斜率关系，试试齐次化方法？"
  3: "将目标量统一用韦达定理中的 −B/A 和 C/A 代入，再化简"
common_mistakes:
  - "齐次化时忘记双曲线方程的负号，导致齐次方程符号错误"
  - "韦达定理代入后分式化简出错，尤其是含参分式通分不当"
  - "讨论渐近线方向遗漏：k=±b/a 时需单独验证"
prerequisite_card_ids:
  - card_hyperbola_set_point
problem_tags:
