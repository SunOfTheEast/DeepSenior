card_id: card_ellipse_geometric
chapter: 解析几何
title: 椭圆几何性质法
summary: >
  直接利用椭圆的对称性、光学反射性质、离心率几何意义等推理，
  不依赖坐标运算，适用于定性分析和特殊位置的快速判断。
general_methods:
  - "对称性：椭圆关于两坐标轴和原点对称，可将问题简化到第一象限讨论"
  - "光学性质：从一个焦点出发的光线经椭圆反射后汇聚到另一个焦点，法线平分焦半径夹角"
  - "离心率几何意义：e=c/a 反映椭圆扁平程度，e→0 趋近圆，e→1 趋近线段"
hints:
  1: "这个问题有没有对称性可以利用？"
  2: "椭圆的定义——到两焦点距离之和为常数——能不能直接帮你解决？"
  3: "利用椭圆定义 |PF₁|+|PF₂|=2a，结合三角不等式可直接得到最值"
common_mistakes:
  - "利用对称性时忘记验证对称位置的点是否满足其他约束条件"
  - "混淆椭圆的焦点在 x 轴还是 y 轴，导致 a, b 对应关系错误"
