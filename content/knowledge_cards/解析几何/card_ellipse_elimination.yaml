card_id: card_ellipse_elimination
chapter: 解析几何
title: 椭圆联立消元技巧
summary: >
  在设点联立法中，如何高效消元、简化运算、减少计算失误的实用技巧集合。
general_methods:
  - "优先消去次数较高的变量：若椭圆含 y²，直线解出 y 代入比解出 x 代入更高效"
  - "设而不求策略：需要 x₁²+x₂² 时用 (x₁+x₂)²−2x₁x₂ 替代，避免开根号"
  - "齐次化技巧：当直线过原点时，令 y=tx 可直接齐次化，减少运算量"
hints:
  1: "消元时，从直线方程里解出哪个变量代入会更简单？"
  2: "你需要分别算出 x₁ 和 x₂ 吗？还是只需要它们的和与积？"
  3: "注意利用 (x₁−x₂)²=(x₁+x₂)²−4x₁x₂ 简化弦长计算"
common_mistakes:
  - "两边同时代入后展开时漏项或符号错误"
  - "齐次化适用条件判断错误（直线不过原点时强行齐次化）"
  - "设而不求时选错了基本对称式，导致需要 x₁³+x₂³ 等高阶量"
prerequisite_card_ids:
  - card_ellipse_set_point
