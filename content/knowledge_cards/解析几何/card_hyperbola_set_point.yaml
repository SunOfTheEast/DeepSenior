card_id: card_hyperbola_set_point
chapter: 解析几何
title: 设点联立法（双曲线）
summary: >
  设直线与双曲线的交点坐标，联立方程组消元得到一元二次方程，
  利用韦达定理建立两根之间的关系。注意双曲线分左右支，需额外判断交点所在支。
general_methods:
  - "设直线 y=kx+m，代入 x²/a²−y²/b²=1 整理为关于 x 的一元二次方程"
  - "判别式 Δ≥0 保证交点存在；韦达定理得 x₁+x₂、x₁x₂"
  - "注意二次项系数可能为零（k=±b/a 时退化为一次方程，仅一个交点）"
hints:
  1: "直线代入双曲线方程后，整理成怎样的一元二次方程？"
  2: "什么条件下二次项系数为零？这时几何上意味着什么？"
  3: "整理为 (b²−a²k²)x²−2a²kmx−a²(m²+b²)=0，当 b²−a²k²=0 时直线平行于渐近线"
common_mistakes:
  - "忽略二次项系数为零的情况（直线平行于渐近线时只有一个交点，不是切线）"
  - "未检验两个交点是否在同一支上（某些问题要求弦在同一支）"
  - "符号错误：双曲线方程中 y² 项前是负号，代入时容易漏负号"
