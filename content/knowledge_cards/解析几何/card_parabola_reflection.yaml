card_id: card_parabola_reflection
chapter: 解析几何
title: 光学反射与切线法（抛物线）
summary: >
  利用抛物线的光学反射性质（平行于轴的光线经反射过焦点）和切线方程
  求解切线、法线及相关几何问题。
general_methods:
  - "抛物线 y²=2px 上点 (x₀,y₀) 的切线方程：yy₀=p(x+x₀)"
  - "光学性质：平行于对称轴的光线经抛物线反射后过焦点（反之亦然）"
  - "切线的斜率 k=p/y₀，法线斜率 k'=−y₀/p"
hints:
  1: "抛物线上一点的切线方程怎么求？"
  2: "抛物线有什么光学性质？平行光反射后会怎样？"
  3: "将 y²=2px 对 x 求导得 2yy'=2p，所以 y'=p/y₀；切线方程 yy₀=p(x+x₀)"
common_mistakes:
  - "切线方程中 x₀ 和 y₀ 不满足曲线方程（点不在抛物线上时应使用切点弦方程）"
  - "混淆切线方程和切点弦方程"
  - "光学性质只适用于平行于对称轴的入射光"
