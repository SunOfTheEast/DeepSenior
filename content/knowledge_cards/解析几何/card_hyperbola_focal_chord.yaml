card_id: card_hyperbola_focal_chord
chapter: 解析几何
title: 焦点弦法（双曲线）
summary: >
  利用双曲线焦半径公式和焦点弦性质处理过焦点的弦问题，
  包括焦点弦长、焦点三角形面积、离心率范围等。
general_methods:
  - "焦半径公式：右支上点 P(x,y), PF₁=a+ex, PF₂=ex−a（e 为离心率）"
  - "焦点弦长公式：过右焦点的弦 |AB|=|e(x₁+x₂)−2a| 或极坐标形式 |AB|=2b²/a·1/(1−e²cos²θ)"
  - "焦点三角形面积：S=b²·tan(∠F₁PF₂/2)"
hints:
  1: "双曲线的焦半径公式和椭圆有什么不同？"
  2: "能不能用焦半径公式直接算弦长，而不联立方程？"
  3: "双曲线焦半径：右支 PF₁=a+ex, PF₂=ex−a；左支符号相反。弦长用焦半径之差的绝对值"
common_mistakes:
  - "焦半径公式中左支和右支的符号搞混"
  - "双曲线焦半径是 |差|=2a 而非和=2a（和椭圆搞混）"
  - "焦点弦两端点可能在不同支上，此时需分别讨论"
