card_id: card_ellipse_parametric
chapter: 解析几何
title: 椭圆参数方程法
summary: >
  利用椭圆参数方程 x=a·cosθ, y=b·sinθ 设点，绕开联立方程组，
  将问题转化为三角函数运算，适用于弦长、面积、最值类问题。
general_methods:
  - "椭圆 x²/a²+y²/b²=1 上的点可参数化为 P(a·cosθ, b·sinθ)，自动满足曲线方程"
  - "两点参数化后，弦长、中点、斜率等均可用 θ₁, θ₂ 表达，避免高次消元"
  - "面积类问题可利用参数化后的叉积公式 S=½|x₁y₂−x₂y₁| 直接计算"
hints:
  1: "想想椭圆上的点能不能用一个角度来表示？"
  2: "椭圆的参数方程是什么形式？设出来之后，原来的约束还需要联立吗？"
  3: "令 P(a·cosθ, b·sinθ)，代入目标表达式，看看能不能化成关于 θ 的函数求最值"
common_mistakes:
  - "参数方程写成 x=a·sinθ, y=b·cosθ（混淆 cos/sin 位置），导致初始相位错误"
  - "忘记参数化后仍需验证 θ 的取值范围（如半椭圆限制 θ∈[0,π]）"
  - "两点参数化时忘记 θ₁≠θ₂ 的约束，导致退化情况未讨论"
