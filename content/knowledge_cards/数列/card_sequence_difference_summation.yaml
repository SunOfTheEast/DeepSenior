card_id: card_sequence_difference_summation
chapter: 数列
title: 逐差求和法（递推求通项）
summary: >
  当递推式可以整理成 a_{n+1}-a_n=f(n) 时，可把前后两项之差看成“离散导数”，
  再从 1 到 n-1 累加，直接得到 a_n-a_1=\sum f(k)。这是处理“前后项差已知”类递推题的标准方法。
general_methods:
  - "先把递推式整理成 a_{n+1}-a_n=f(n) 的形式"
  - "对 k=1 到 n-1 累加，左边变成 a_n-a_1，右边变成 \u2211f(k)"
  - "再利用常见求和公式（平方和、等差和等）得到 a_n 的显式表达"
hints:
  1: "这个递推式能不能先改写成前后两项之差？"
  2: "把这些差从 1 累加到 n-1，左边会发生什么消去？"
  3: "先求出 a_n-a_1，再代入 a_1 的值整理通项"
common_mistakes:
  - "累加上界写错，把 n-1 写成 n，导致多出一项"
  - "左边累加后误写成 a_{n+1}-a_1，而不是 a_n-a_1"
  - "只会列出求和式，却忘了继续用求和公式化简"
