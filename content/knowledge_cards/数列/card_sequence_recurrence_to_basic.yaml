card_id: card_sequence_recurrence_to_basic
chapter: 数列
title: 递推转等差/等比
summary: >
  许多数列递推题的核心不是直接硬算，而是识别结构并把原数列转化为更基础的等差列、等比列或常数列。
  常见方式包括作差、作商、平移、缩放和构造辅助数列。
general_methods:
  - "若 a_{n+1}-a_n 规律明显，优先考虑作差或累加"
  - "若 a_{n+1}/a_n 规律明显，优先考虑转化为等比数列"
  - "若递推含常数项或低次多项式项，尝试平移或构造辅助数列"
hints:
  1: "先别急着展开，先判断这是更像等差、等比，还是需要构造新数列"
  2: "如果多出来的项像多项式差分，能否把它配成 f(n+1)-f(n)？"
  3: "把原数列转化成熟悉的基础数列之后，再回到原问题"
common_mistakes:
  - "看到递推就机械展开，忽略了结构识别"
  - "转化后没有检查新数列的初值"
  - "把等差与等比的判据混用"
